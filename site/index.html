<!DOCTYPE html>
<html>
<head>
	<title>smallboi</title>
	<meta name="darkreader-lock">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

	<style>
		* {
			padding: 0;
			margin: 0;
			box-sizing: border-box;
		}
		html {
			background: #171717;
			color: #F5F5F5;
		}
		a {
			color: #FFB86A;
		}
		a:hover {
			color: #FF8904;
		}
		body {
			max-width: 64rem;
			margin-left: auto;
			margin-right: auto;
			padding: 3rem 2rem;

			font-size: 1.125rem;
			line-height: 1.25;

			font-family: "Inter", sans-serif;
			font-optical-sizing: auto;
			font-weight: 400;
			font-style: normal;
		}

		h1 {
			color: #7C86FF;
			font-family: "Bitcount Grid Double", system-ui;
			font-optical-sizing: auto;
			font-weight: 400;
			font-style: normal;
			font-variation-settings:
				"slnt" 0,
				"CRSV" 0.5,
				"ELSH" 0,
				"ELXP" 0;
			font-size: 1.875rem;
			line-height: 1.2;
		}
		ul {
			margin: 1.25rem 0;
		}
		li {
			margin-bottom: 1rem;
		}
		li:last {
			margin-bottom: 0;
		}
	</style>
</head>
<body>
	<h1>smallboi server</h1>
	<ul>
		<li><a href="http://192.168.100.28:9090">Cockpit | Admin Panel</a></li>
		<li><a href="http://192.168.100.28:9000">Portainer | Manage Docker</a></li>
		<li><a href="http://192.168.100.28:8096">Jellyfin</a></li>
		<li><a href="http://192.168.100.28:4000">qBittorrent</a></li>
		<li><a href="http://192.168.100.28:8080">Project Nomad</a></li>
	</ul>
	<script>
		const anchors = document.querySelectorAll("a");
		anchors.forEach(a => {
			const port = new URL(a.href).port;
			const url = new URL(window.location.href);
			url.port = port;
			a.href = url.toString();
		})
	</script>
</body>
</html>
